# render.yaml — Render Blueprint for SmartVend v3.0
# Deploy: Connect repo on Render → auto-detects this file
# Docs: https://render.com/docs/blueprint-spec

services:
  # ── Backend (FastAPI + WebSocket) ──
  - type: web
    name: smartvend-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false  # Set to your frontend Render URL
      - key: ADMIN_PASSWORD
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_SECRET_KEY
        sync: false
      - key: RAZORPAY_WEBHOOK_SECRET
        sync: false
      - key: SMTP_SERVER
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_PASSWORD
        sync: false
      - key: RECEIVER_EMAIL
        sync: false
      - key: PRICE_PER_UNIT_PAISA
        value: "100"
      - key: SESSION_TTL_SECONDS
        value: "60"
      - key: CLAIM_TTL_SECONDS
        value: "300"
      - key: MOTOR_TIMEOUT_SECONDS
        value: "120"
      # Optional Redis (uncomment if using Render Redis)
      # - key: REDIS_URL
      #   fromService:
      #     type: redis
      #     name: smartvend-redis
      #     property: connectionString

  # ── Frontend (React Static Site) ──
  - type: web
    name: smartvend-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      # Build-time vars for Vite (injected as Docker build args)
      - key: VITE_BACKEND_URL
        sync: false  # Set to your backend Render URL (https://smartvend-backend.onrender.com)
      - key: VITE_RAZORPAY_KEY_ID
        sync: false
      - key: VITE_SUPABASE_URL
        sync: false
      - key: VITE_SUPABASE_ANON_KEY
        sync: false
      - key: VITE_PRICE_PER_UNIT
        value: "1"
